<!DOCTYPE html>
<html>
  <head>
    <title>Render Deployment</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
      setTimeout(() => {
        confetti({
          particleCount: 100,
          spread: 70,
          origin: { y: 0.5 },
          disableForReducedMotion: true
        });
      }, 500);
    </script>
    <style>
      html {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        font-weight: 700;
        font-size: calc(62rem / 16);
      }
      body {
        background: white;
      }
      section {
        border-radius: 1em;
        padding: 1em;
        position: absolute;
        top: 50%;
        left: 50%;
        margin-right: -50%;
        transform: translate(-50%, -50%);
        text-align: center;
      }
      a {
        color: #0066cc;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      p {
        font-size: 0.3em;
        margin: 0.5em 0;
      }
    </style>
  </head>
  <body>
    <section>
      <p>Deployed in Render</p>
      <p>A fork of <a href="https://github.com/render-examples/go-web-server/">Go Web Server</a></p>
      <p>Part of Week 1 Assignment of <a href="https://tl.oamk.fi/cloudservices/">Cloud Services</a></p>
      <p><a href="https://github.com/BishalRai/go-web-server/">Check out fork and edited source code</a></p>
    </section>
  </body>
</html>
